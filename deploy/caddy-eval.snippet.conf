# Reverse-proxy snippet (Caddy example). Add this site block to your Caddyfile and reload.
# 反向代理示例（Caddy）。把这个站点块加进 Caddyfile 后 reload。
# Prerequisites / 前提：
#   1) 一条指向本服务器的 DNS A/AAAA 记录（把下面域名换成你自己的）。
#   2) Caddy 容器与 evaluator 容器在同一 docker 网络（见 docker-compose.evaluator.yml），
#      这样才能用容器名 evaluator:5180 反代。
# Caddy 会自动申请 / 续期 HTTPS 证书。

evaluator.example.com {
	reverse_proxy evaluator:5180
}
